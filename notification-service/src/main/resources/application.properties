spring.application.name=notification-service
SENDGRID_API_KEY=${SENDGRID_API_KEY}
SENDER_EMAIL=${SENDER_EMAIL}
server.port=${PORT:4007}

spring.kafka.bootstrap-servers=${KAFKA_URL}
spring.kafka.properties.security.protocol=SSL
spring.kafka.properties.ssl.keystore.type=PEM
spring.kafka.properties.ssl.keystore.certificate.chain=${KAFKA_CERT}
spring.kafka.properties.ssl.keystore.key=${KAFKA_KEY}
spring.kafka.properties.ssl.truststore.type=PEM
spring.kafka.properties.ssl.truststore.certificates=${KAFKA_CA}
spring.kafka.properties.ssl.endpoint.identification.algorithm=

spring.kafka.consumer.group-id=notification-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.enable-auto-commit=true

spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.ByteArrayDeserializer