server:
  port: 4004


auth:
  service:
    url: ${AUTH_SERVICE_URL:http://localhost:4005}


spring:
  cloud:
    gateway:
      routes:
        - id: patient-service
          uri: http://patient-service:4000
          predicates:
            - Path=/api/patients
            - Path=/api/patients/**
          filters:
            - StripPrefix=1
            - JwtValidation

        - id: auth-service-route
          uri: http://auth-service:4005
          predicates:
            - Path=/auth/**
          filters:
            - StripPrefix=1

        - id: api-docs-patient-route
          uri: http://patient-service:4000
          predicates:
            - Path= /api-docs/patients
          filters:
            - RewritePath= /api-docs/patients,/v3/api-docs

        - id: api-docs-auth-route
          uri: http://auth-service:4005
          predicates:
            - Path= /api-docs/auth
          filters:
            - RewritePath= /api-docs/auth,/v3/api-docs

        # ---------------- CYCLE ----------------
        - id: cycle-tracker-cycles
          uri: http://cycle-tracker-service:4006
          predicates:
            - Path=/api/cycles/**
          filters:
            - StripPrefix=1
            - JwtValidation

        # ---------------- AI INSIGHTS ----------------
        - id: cycle-tracker-ai
          uri: http://cycle-tracker-service:4006
          predicates:
            - Path=/api/ai/insights/**
          filters:
            - StripPrefix=1
            - JwtValidation

        # ---------------- HEALTH PROFILE ----------------
        - id: cycle-tracker-health
          uri: http://cycle-tracker-service:4006
          predicates:
            - Path=/api/health-profile/**
          filters:
            - StripPrefix=1
            - JwtValidation

        # ---------------- SYMPTOMS ----------------
        - id: cycle-tracker-symptoms
          uri: http://cycle-tracker-service:4006
          predicates:
            - Path=/api/symptoms/**
          filters:
            - StripPrefix=1
            - JwtValidation
