# version: "3.8"   ← you can safely remove this line (obsolete since Compose v2)

services:
  patient-service-db:
    image: postgres:latest
    container_name: patient-service-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: patient_db
      TZ: Asia/Kolkata
      PGTZ: Asia/Kolkata
      PGDATA: /var/lib/postgresql/data/pgdata   # good for postgres 18+
    ports:
      - "5000:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - patient-network

  patient-service:
    build:
      context: ./patient-service          # ← fixed: relative path from docker-compose location
      dockerfile: Dockerfile              # optional - add if you have custom Dockerfile
    container_name: patient-service
    ports:
      - "4000:4000"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://patient-service-db:5432/patient_db
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=password
      - SPRING_JPA_DATABASE_PLATFORM=org.hibernate.dialect.PostgreSQLDialect
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
    depends_on:
      patient-service-db:
        condition: service_healthy
    networks:
      - patient-network

  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: api-gateway
    environment:
      AUTH_SERVICE_URL: http://auth-service:4005
      PATIENT_SERVICE_URL: http://patient-service:4000
    ports:
      - "4004:4004"
    depends_on:
      - patient-service
      - auth-service
    networks:
      - patient-network
  auth-service-db:
    image: postgres:latest
    container_name: auth-service-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: auth_db
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5001:5432"
    volumes:
      - auth_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - patient-network

  auth-service:
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    container_name: auth-service
    ##ports:
      ##- "4005:4005"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://auth-service-db:5432/auth_db
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=password
      - SPRING_JPA_DATABASE_PLATFORM=org.hibernate.dialect.PostgreSQLDialect
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update

    depends_on:
      auth-service-db:
        condition: service_healthy
    networks:
      - patient-network

  cycle-tracker-db:
    image: postgres:latest
    container_name: cycle-tracker-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: cycle_tracker_db
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5002:5432"
    volumes:
      - cycle_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - patient-network


  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - patient-network

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    ports:
      - "9094:9094"
    depends_on:
      - zookeeper
    volumes:
      - kafka_data:/var/lib/kafka/data
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    networks:
      - patient-network


  analytics-service:
    build:
      context: ./analytics-service
      dockerfile: Dockerfile
    container_name: analytics-service
    environment:
      - SPRING_APPLICATION_NAME=analytics-service
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - SPRING_KAFKA_CONSUMER_AUTO_OFFSET_RESET=earliest
    depends_on:
      - kafka
    networks:
      - patient-network
  cycle-tracker-service:
    build:
      context: ./cycle-tracker-service
      dockerfile: Dockerfile
    container_name: cycle-tracker-service
    depends_on:
      cycle-tracker-db:
        condition: service_healthy
      kafka:
        condition: service_started
    ports:
      - "4006:4006"
    environment:
      - SPRING_APPLICATION_NAME=cycle-tracker-service
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - SPRING_KAFKA_CONSUMER_AUTO_OFFSET_RESET=earliest
    networks:
      - patient-network

  notification-service:
    build:
      context: ./notification-service
      dockerfile: Dockerfile
    container_name: notification-service
    environment:
      - SPRING_APPLICATION_NAME=notification-service
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - SPRING_KAFKA_CONSUMER_AUTO_OFFSET_RESET=earliest

    depends_on:
      - kafka
    networks:
      - patient-network

volumes:
  postgres_data:
  auth_postgres_data:
  cycle_postgres_data:
  kafka_data:

networks:
  patient-network:
    driver: bridge